apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-os-frontend
  labels:
    app: nexus-os
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-os
      component: frontend
  template:
    metadata:
      labels:
        app: nexus-os
        component: frontend
    spec:
      containers:
        - name: frontend
          image: nexus-os:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: nexus-os-config
                  key: api-url
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-os-frontend
spec:
  selector:
    app: nexus-os
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-os-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - nexus-os.example.com
      secretName: nexus-os-tls
  rules:
    - host: nexus-os.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-os-frontend
                port:
                  number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-os-config
data:
  api-url: "https://api.nexus-os.example.com"
